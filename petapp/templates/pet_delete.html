<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Pet</title>
</head>
<body>
    <h1>Delete Pet</h1>
    <p>Are you sure you want to delete "<b>{{ object.pet_name }}</b>"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'pet_list' %}">Cancel</a>
    </form>
</body>
</html>
